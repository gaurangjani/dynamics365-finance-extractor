<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#0078D4"/>

  <!-- Inner content area -->
  <rect x="16" y="16" width="96" height="96" rx="12" fill="#FFFFFF" opacity="0.1"/>

  <!-- Table/Grid (configuration data) -->
  <g fill="#FFFFFF">
    <!-- Header row -->
    <rect x="24" y="24" width="80" height="8" rx="1" opacity="0.9"/>

    <!-- Data rows -->
    <rect x="24" y="36" width="70" height="6" rx="1" opacity="0.7"/>
    <rect x="24" y="46" width="75" height="6" rx="1" opacity="0.7"/>
    <rect x="24" y="56" width="68" height="6" rx="1" opacity="0.7"/>

    <!-- Comparison indicator (arrows) -->
    <circle cx="40" cy="76" r="3" opacity="0.8"/>
    <circle cx="88" cy="76" r="3" opacity="0.8"/>

    <!-- Arrow showing comparison -->
    <path d="M 46 75 L 82 75 M 80 73 L 82 75 L 80 77" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- Checkmark (indicating matching data) -->
    <path d="M 40 88 L 44 92 L 50 84" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
