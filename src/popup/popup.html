<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D365 Finance Config Extractor</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ D365 Finance Config</h1>
            <p class="subtitle">Extract & Compare Configuration Across Legal Entities</p>
        </div>

        <div id="statusAlert" class="alert alert-info" style="display: none;">
            <span id="statusText"></span>
        </div>

        <div id="loadingSpinner" class="spinner" style="display: none;"></div>

        <form id="extractionForm">
            <!-- Legal Entities Selection -->
            <div class="form-group">
                <label class="form-label">Legal Entities</label>
                <div class="le-selection">
                    <button type="button" class="btn-link" id="selectAllLE">Select All</button>
                    <button type="button" class="btn-link" id="clearAllLE">Clear All</button>
                </div>
                <div id="legalEntitiesList" class="checkbox-group">
                    <div class="loading-text">Loading legal entities...</div>
                </div>
            </div>

            <!-- Module Selection -->
            <div class="form-group">
                <label class="form-label">D365F Modules</label>
                <div class="entity-selection">
                    <button type="button" class="btn-link" id="selectAllModules">All Modules</button>
                    <button type="button" class="btn-link" id="selectCoreModules">Core Only</button>
                    <button type="button" class="btn-link" id="clearAllModules">Clear All</button>
                </div>
                <div id="modulesList" class="modules-grid">
                    <!-- Modules will be populated by JavaScript -->
                </div>
            </div>

            <!-- Entity Types Selection (Dynamic) -->
            <div class="form-group">
                <label class="form-label">Configuration Entities</label>
                <div class="entity-selection">
                    <button type="button" class="btn-link" id="selectAllEntity">Select All</button>
                    <button type="button" class="btn-link" id="clearAllEntity">Clear All</button>
                </div>
                <div id="entitiesList" class="checkbox-group">
                    <!-- Entities will be populated based on selected modules -->
                </div>
            </div>

            <!-- Export Format Selection -->
            <div class="form-group">
                <label class="form-label">Export Formats</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="format" value="xlsx" checked>
                        <span>Excel (.xlsx)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="format" value="csv">
                        <span>CSV (.csv)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="format" value="json">
                        <span>JSON (.json)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="format" value="txt">
                        <span>Text (.txt)</span>
                    </label>
                </div>
            </div>

            <!-- Options -->
            <div class="form-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="includeComparison" checked>
                    <span>Include Comparison Report</span>
                </label>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="submit" id="extractBtn" class="btn btn-primary">
                    <span>Extract Configuration</span>
                </button>
                <button type="button" id="cancelBtn" class="btn btn-secondary" style="display: none;">
                    <span>Cancel</span>
                </button>
            </div>
        </form>

        <!-- Progress Section -->
        <div id="progressSection" style="display: none;">
            <div class="progress-header">
                <span id="progressText">Starting extraction...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressDetails" class="progress-details"></div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" style="display: none;">
            <div class="results-header">
                <h3>Extraction Complete</h3>
            </div>
            <div id="resultsList" class="results-list"></div>
            <button type="button" id="newExtractionBtn" class="btn btn-primary">
                <span>New Extraction</span>
            </button>
        </div>

        <div class="footer">
            <small>v1.0.0 | D365 Finance Configuration Extractor</small>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
