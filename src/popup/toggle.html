<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 250px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            color: #fff;
        }

        .container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .header h2 {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
            color: #00d4ff;
        }

        .header p {
            margin: 4px 0 0 0;
            font-size: 12px;
            color: #6c7299;
        }

        .button {
            padding: 12px 16px;
            background: linear-gradient(135deg, #0078d4 0%, #6c63ff 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0,120,212,0.3);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,120,212,0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .status {
            text-align: center;
            font-size: 12px;
            color: #6c7299;
            min-height: 16px;
        }

        .success {
            color: #00b050;
        }

        .info {
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 6px;
            padding: 8px;
            font-size: 11px;
            color: #6c7299;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>⚙️ D365 Finance</h2>
            <p>Configuration Extractor</p>
        </div>

        <button id="toggleBtn" class="button">
            Open Sidebar
        </button>

        <div id="status" class="status"></div>

        <div class="info">
            📋 Extracts configuration &amp; setup data across all legal entities from Dynamics 365 Finance via OData and exports a cross-LE comparison to Excel.<br><br>
            ⚠️ Open this on a Dynamics 365 Finance page before clicking.
        </div>
    </div>

    <script src="toggle.js"></script>
</body>
</html>
